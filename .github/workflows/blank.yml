name: Deploy to GitHub Pages

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20   # or 22 if your project needs it

      - name: Install dependencies
        run: npm ci    # change to yarn or pnpm if you use those

      - name: Build
        run: npm run build   # adjust if your build command is different

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'   # change to 'dist', 'build', or 'out' if your build outputs to a folder

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
